<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkTalk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TalkTalk</h1>

  <nav>
    <button onclick="showPage('loginPage')">로그인</button>
    <button onclick="showPage('postPage')">게시글</button>
    <button onclick="showPage('chatPage')">채팅</button>
  </nav>
</header>

<main>

  <!-- 로그인 -->
  <section id="loginPage" class="page active">
    <h2>로그인</h2>

    <input type="email" id="email" placeholder="이메일">
    <input type="password" id="password" placeholder="비밀번호">

    <button onclick="signup()">회원가입</button>
    <button onclick="login()">로그인</button>

    <p id="userInfo"></p>
  </section>

  <!-- 게시글 -->
  <section id="postPage" class="page">
    <h2>게시글</h2>

    <textarea id="postInput" placeholder="게시글 작성"></textarea>
    <button onclick="addPost()">게시글 작성</button>

    <div id="postList"></div>
  </section>

  <!-- 채팅 -->
  <section id="chatPage" class="page">
    <h2>실시간 채팅</h2>

    <div id="chatBox"></div>

    <input type="text" id="chatInput" placeholder="메시지 입력">
    <button onclick="sendMessage()">전송</button>
  </section>

</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
